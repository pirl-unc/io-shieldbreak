site_name: io-shieldbreak
site_description: Curated clinical-trial tables and critical reviews of manuscripts on strategies to overcome resistance to cancer immunotherapies
site_url: https://pirl-unc.github.io/io-shieldbreak/
repo_url: https://github.com/pirl-unc/io-shieldbreak
repo_name: pirl-unc/io-shieldbreak
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.action.edit
    - content.tables.sortable
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - footnotes
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

extra_css:
  - stylesheets/treg-depletion.css
  - stylesheets/tam-depletion.css

nav:
  - Home: index.md
  - Shieldbreaks: shieldbreaks/index.md
  - Runs: runs.md
  - Methods: methods.md
